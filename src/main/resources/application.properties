spring.datasource.url=jdbc:postgresql://warehouse-dev-db:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
auth.token.name=AUTH_TOKEN
auth.token.max-age=43200
auth.token.secure=false
auth.jwt.expiration-seconds=43200
auth.jwt.secret=warehouse-management-system-change-me-very-secret-key
